
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    ports:
      - "5433:5432"   # host:container (localhost only — dev diagnostic access)
    image: postgres:16-alpine
    container_name: fingerprint_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fingerprint
      POSTGRES_USER:     fingerprint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U fingerprint"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fingerprint_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Express API ─────────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: Dockerfile
    image: fingerprint-api:latest
    container_name: fingerprint_api
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      PORT:                  3000
      DATABASE_URL:          postgresql://fingerprint:${POSTGRES_PASSWORD}@postgres:5432/fingerprint
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379
      API_KEY:               ${API_KEY}
      SEPOLIA_URL:           ${SEPOLIA_URL}
      PRIVATE_KEY:           ${PRIVATE_KEY}
      MASTER_KEY_PASSWORD:   ${MASTER_KEY_PASSWORD}
      TRIAGE_AGENT_PROVIDER: ${TRIAGE_AGENT_PROVIDER:-rules}
      TRIAGE_AGENT_SLUG:     ${TRIAGE_AGENT_SLUG:-rules-engine-v1}
      TRIAGE_AGENT_NAME:     ${TRIAGE_AGENT_NAME:-Clinical Rules Engine}
      TRIAGE_AGENT_MODEL:    ${TRIAGE_AGENT_MODEL:-tinydolphin}
      OLLAMA_ENDPOINT:       ${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      REACT_APP_SEPOLIA_CONTRACT_ADDRESS:  ${REACT_APP_SEPOLIA_CONTRACT_ADDRESS}
      REACT_APP_SEPOLIA_CHAIN_ID:          ${REACT_APP_SEPOLIA_CHAIN_ID}
      DISABLE_NER:                         ${DISABLE_NER:-false}
      NODE_OPTIONS:                        --max-old-space-size=1200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"

  # ── Blockchain Indexer ──────────────────────────────────────────────────────
  indexer:
    build:
      context:    .
      dockerfile: Dockerfile
    image: fingerprint-api:latest
    container_name: fingerprint_indexer
    restart: "no"
    command: ["npx", "ts-node", "scripts/indexer.ts"]
    environment:
      NODE_ENV:                           production
      DATABASE_URL:                       postgresql://fingerprint:${POSTGRES_PASSWORD}@postgres:5432/fingerprint
      REDIS_URL:                          redis://:${REDIS_PASSWORD}@redis:6379
      SEPOLIA_URL:                        ${SEPOLIA_URL}
      REACT_APP_SEPOLIA_CONTRACT_ADDRESS:  ${REACT_APP_SEPOLIA_CONTRACT_ADDRESS}
      REACT_APP_SEPOLIA_CHAIN_ID:          ${REACT_APP_SEPOLIA_CHAIN_ID}
      DISABLE_NER:                        ${DISABLE_NER:-false}
      DISABLE_INDEXER:                    ${DISABLE_INDEXER:-false}
      NODE_OPTIONS:                       --max-old-space-size=1200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx + React frontend ───────────────────────────────────────────────────
  nginx:
    build:
      context:    .
      dockerfile: Dockerfile.nginx
      args:
        # Frontend calls the API via same-origin Nginx proxy — no CORS needed
        REACT_APP_API_GATEWAY_URL: ""
        API_KEY:                   ${API_KEY}
        REACT_APP_SEPOLIA_RPC_URL:           ${REACT_APP_SEPOLIA_RPC_URL}
        REACT_APP_SEPOLIA_CONTRACT_ADDRESS:  ${REACT_APP_SEPOLIA_CONTRACT_ADDRESS}
        REACT_APP_SEPOLIA_CHAIN_ID:          ${REACT_APP_SEPOLIA_CHAIN_ID}
    image: fingerprint-nginx:latest
    container_name: fingerprint_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      # Mount config as a volume so we can swap HTTP→HTTPS without a rebuild
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Certbot SSL certificates (populated after first cert issuance)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

  # ── Certbot (auto-renewal every 12 h) ────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: fingerprint_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew twice daily; sleeps between attempts
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $$!; done'"
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
