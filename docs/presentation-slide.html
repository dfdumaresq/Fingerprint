<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Fingerprinting - Presentation Slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 15%;
            animation-delay: 3s;
        }

        .circle:nth-child(3) {
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 20%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-30px) scale(1.1);
                opacity: 0.5;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 80px 100px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -2px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 80px;
            margin: 60px 0;
        }

        .qr-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .qr-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .qr-container:hover {
            transform: scale(1.05);
        }

        .qr-code-img {
            width: 300px;
            height: 300px;
            display: block;
            border-radius: 10px;
        }

        .github-link {
            font-size: 1.6rem;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .github-link:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(10px);
        }

        .info-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }

        .event-info {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        /* Pulse animation for QR code */
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 15px 60px rgba(102, 126, 234, 0.4);
            }
        }

        .qr-container {
            animation: pulse 3s infinite ease-in-out;
        }

        /* Responsive design */
        @media (max-width: 1200px) {
            .container {
                padding: 60px 70px;
            }
            
            h1 {
                font-size: 3.5rem;
            }
            
            .content {
                flex-direction: column;
                gap: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>AI Agent Fingerprinting System</h1>
            <p class="subtitle">Secure verification of AI agents using blockchain technology</p>
        </div>

        <div class="content">
            <div class="qr-section">
                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://github.com/dfdumaresq/Fingerprint" 
                         alt="QR Code to GitHub Repository" 
                         class="qr-code-img">
                </div>
                <a href="https://github.com/dfdumaresq/Fingerprint" class="github-link" target="_blank">
                    github.com/dfdumaresq/Fingerprint
                </a>
            </div>

            <div class="info-section">
                <div class="info-card">
                    <div class="info-label">Project</div>
                    <div class="info-value">Blockchain-based AI Identity</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Technology</div>
                    <div class="info-value">Ethereum • Solidity • React</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Network</div>
                    <div class="info-value">Sepolia Testnet</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p class="footer-text">AI Safety Canada Meetup #3</p>
            <p class="event-info">Lightning Talk • December 2025</p>
        </div>
    </div>


</body>
</html>
