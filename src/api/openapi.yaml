openapi: 3.0.0
info:
  title: AI Fingerprint Web3 Gateway
  version: 0.2.1
paths:
  /v1/agents/{fingerprintHash}:
    get:
      summary: Get on-chain agent profile (indexed)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: fingerprintHash
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{64}$"
      responses:
        '200':
          description: Agent Profile Data
  /v1/agents:
    get:
      summary: List agents with optional filters
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: provider
          schema:
            type: string
        - in: query
          name: owner
          schema:
            type: string
            description: Ethereum address of the owner
        - in: query
          name: status
          schema:
            type: string
            enum: [active, revoked, all]
          description: Filter by revocation status
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Max items per page
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque pagination cursor
      responses:
        '200':
          description: List of agents
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '503':
          description: Indexer unavailable
  /v1/agents/verify:
    post:
      summary: Verify an AI agent fingerprint using off-chain Keccak256
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fingerprintHash]
              properties:
                fingerprintHash:
                  type: string
                  pattern: "^0x[a-fA-F0-9]{64}$"
                currentTraitPayload:
                  type: string
                context:
                  type: object
                  properties:
                    ip_address:
                      type: string
                    user_agent:
                      type: string
      responses:
        '200':
          description: Verification result with Trust Score
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
